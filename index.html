<!DOCTYPE html>

  <meta name="theme-color" content="#05030f" />
  <meta name="description" content="Starweaver — a roguelite bullet-hell spell-shooter. Dodge, weave arcana, and break the swarm." />
  <title>Starweaver</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

<body>
  <div id="splash" class="splash">
    <div class="splash-mark">STARWEAVER</div>
    <div class="splash-sub">aligning the constellations…</div>
  </div>

  <main id="app" class="app"></main>
  <canvas id="game" aria-hidden="true"></canvas>

  <script type="module" src="js/main.js"></script>
  <!-- hub-stats visit counter -->
  <script>(function(){try{var A="starweaver",K="hubdev",d=localStorage.getItem(K);if(!d){d=(self.crypto&&crypto.randomUUID?crypto.randomUUID():Date.now()+"."+Math.random().toString(36).slice(2));localStorage.setItem(K,d);}var u="https://hub-stats.mathiasjob.workers.dev/hit",b=JSON.stringify({app:A,d:d});if(navigator.sendBeacon){navigator.sendBeacon(u,new Blob([b],{type:"application/json"}));}else{fetch(u,{method:"POST",body:b,headers:{"Content-Type":"application/json"},keepalive:true,mode:"no-cors"});}}catch(e){}})();</script>
</body>
